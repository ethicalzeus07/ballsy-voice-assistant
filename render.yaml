services:
  - type: web
    name: ballsy-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_MODEL
        value: mistralai/mistral-nemotron
      - key: ENVIRONMENT
        value: production
      - key: USE_CLOUDFLARE_TTS
        value: false
      - key: USE_CLOUD_TTS
        value: false
      - key: ENABLE_GEMINI_TTS
        value: false
      - key: CORS_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
